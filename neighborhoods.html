      <h1>Neighborhoods & Corridors</h1>
      <p>Browse NYC by neighborhood and corridor. Tap any card to open the map in a new tab.</p>

    <div class="section">

  <script src="assets/site.js"></script>
  <script>
    // Starter examples.
    // Once your screenshot script finishes, we’ll swap "screenshot" to real paths like:
    // screenshot: "output/neighborhoods/<mapId>__bed-stuy-gateway-bid.png"
    const items = [
      {
        name:"Bed-Stuy Gateway BID",
        pill:"Corridor",
        sub:"Bars, restaurants, essentials",
        url:"https://share.livexyz.com/maplist/5ca3841cf7787b00017c0ddb?theme=dark",
        screenshot:"output/neighborhoods/5ca3841cf7787b00017c0ddb__bed-stuy-gateway-bid.png"
      },
      {
        name:"47th Street BID",
        pill:"Corridor",
        sub:"Midtown corridor",
        url:"https://share.livexyz.com/maplist/5ca384fbcb5baf0001a11b47?theme=dark",
        screenshot:"output/neighborhoods/5ca384fbcb5baf0001a11b47__47th-street-bid.png"
      }
    ];

    const grid = document.getElementById("grid");
    renderCards(grid, items);
    wireSearch(document.getElementById("q"), items, (filtered)=> renderCards(grid, filtered));
  </script>
